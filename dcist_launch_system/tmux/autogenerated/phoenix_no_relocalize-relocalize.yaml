nodes_to_monitor:
  gps_monitor:
    external_monitor: {type: GpsMonitor}
  ntrip_monitor:
    external_monitor: {type: NtripMonitor}
  tx_rx_monitor: {}
session_name: adt4_system
suppress_history: false
environment:
  sim_time: $ADT4_SIM_TIME
  ADT4_PRIOR_MAP: $ADT4_PRIOR_MAP
  ADT4_OUTPUT_DIR: $ADT4_OUTPUT_DIR
  HERACLES_NEO4J_USERNAME: $ADT4_NEO4J_USERNAME
  HERACLES_NEO4J_PASSWORD: $ADT4_NEO4J_PASSWORD
  HERACLES_OPENAI_API_KEY: $ADT4_OPENAI_API_KEY
  HERACLES_EVALUATION_PATH: $ADT4_HERACLES_AGENTS_PATH
  ADT4_MONITOR_CONFIG: "{nodes_to_track: {gps_monitor: {external_monitor: {type: GpsMonitor}}, ntrip_monitor: {external_monitor: {type: NtripMonitor}}, tx_rx_monitor: {}}}"
  ADT4_ROBOT_NAME: $ADT4_ROBOT_NAME
  config: relocalize
  logging_key: phoenix_no_relocalize-relocalize
options:
  default-command: /bin/zsh
windows:
  - window_name: sensors
    shell_command_before: source ${ADT4_WS}/install/setup.zsh
    layout: tiled
    panes:
      - ros2 launch dcist_launch_system master.launch.yaml conf_name:=$config sim_time:=$sim_time robot_name:=$ADT4_ROBOT_NAME launch_gps:=true
      - ros2 launch dcist_launch_system master.launch.yaml conf_name:=$config sim_time:=$sim_time robot_name:=$ADT4_ROBOT_NAME launch_ntrip:=true
      - ros2 launch dcist_launch_system master.launch.yaml conf_name:=$config sim_time:=$sim_time robot_name:=$ADT4_ROBOT_NAME launch_zed:=true
      - ros2 launch dcist_launch_system master.launch.yaml conf_name:=$config sim_time:=$sim_time robot_name:=$ADT4_ROBOT_NAME launch_tx_rx:=true
