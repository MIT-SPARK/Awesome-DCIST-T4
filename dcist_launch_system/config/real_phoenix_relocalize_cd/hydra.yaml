paths: [khronos, khronos_ros]
robot_id: 0
config_verbosity: 0
map_frame: $<env ADT4_ROBOT_NAME>/odom
odom_frame: $<env ADT4_ROBOT_NAME>/odom
robot_frame: $<env ADT4_ROBOT_NAME>/base_link
map_window: {type: spatial, max_radius_m: 14.0}
input:
  type: RosInput
  max_receiver_queue_size: 1
  inputs:
    camera:
      receiver: {type: ClosedSetImageReceiver, queue_size: 30}
      sensor:
        type: camera_info
        min_range: 0.2
        max_range: 10.0
        extrinsics: {type: ros}
active_window:
  volumetric_map: {voxels_per_side: 16, voxel_size: 0.15, truncation_distance: 0.3, with_semantics: true}
  type: ActiveWindow
  projective_integrator:
    semantic_integrator: {type: SingleLabelIntegrator}
  min_output_separation: 0.5
  object_detector:
    type: ConnectedSemantics
    min_cluster_size: 20
    use_full_connectivity: true
    use_3d: true
    max_range: 10.0
    grid_size: 0.2
  tracker:
    type: MaxIouTracker
    track_by: voxels
    min_semantic_iou: 0.25
    min_cross_iou: 0.1
    voxel_size: 0.2
    temporal_window: 3.0
    min_num_observations: 10
  object_extractor:
    type: MeshObjectExtractor
    verbosity: 0
    min_object_allocation_confidence: 0.5
    min_object_volume: 0.005
    max_object_volume: 100.0
    min_dynamic_displacement: 1
    only_extract_reconstructed_objects: true
    min_object_reconstruction_confidence: 0.5
    min_object_reconstruction_observations: 10
    object_reconstruction_resolution: -0.05
    visualizer_classification: false
    projective_integrator:
      num_threads: 8
  khronos_sinks:
    - type: ActiveWindowVisualizer
      slice_height_is_relative: true
      num_slices: 5
      marker_opacity: 10
      slice_distance_multiplier: 3
    - type: ActiveWindowChangeDetector
      verbosity: 1
      prior_map_path: $<env ADT4_PRIOR_MAP>/hydra/backend/dsg_with_mesh.json
      enable_icp_refinement: true
      invert_roman_lc_transform: false
      icp_crop_radius: 10.0
      icp_num_threads: 2
      icp_downsampling_resolution: 0.2
      icp_max_correspondence_distance: 1.0
      icp_min_inliers: 50
      transformation_getter:
        type: TFTransformationGetter
        prior_frame_id: map
        robot_frame_id: ""
        tf_change_threshold_m: 0.05
      awcd_sinks:
        - type: ActiveWindowChangeDetectorVisualizer
          bounding_box_line_width: 0.1
          verbosity: 0
          global_frame_name: prior_map_frame
          plugins:
            mesh:
              use_color_adaptor: false
          renderer:
            layer_z_step: 5.5
            collapse_layers: false
            layers:
              2:
                z_offset_scale: 2.0
                visualize: true
                nodes:
                  scale: 0.40
                  color:
                    type: LabelColorAdapter
                    alpha: 0.8
                    use_sphere: false
                text:
                  draw: true
                  collapse: true
                  adapter:
                    type: LabelIdTextAdapter
                  height: 0.5
                  scale: 0.45
                bounding_boxes: {draw: true, collapse: true, scale: 0.05, edge_scale: 0.05, alpha: 0.9, edge_break_ratio: 0.5}
                edges: {interlayer_use_source: true, interlayer_scale: 0.08, interlayer_alpha: 0.9, interlayer_use_color: true}
              3:
                z_offset_scale: 3.0
                visualize: true
                nodes:
                  scale: 0.2
                  color:
                    type: ParentColorAdapter
                    colormap: {palette: colorbrewer}
                  alpha: 0.9
                  use_sphere: true
                edges:
                  scale: 0.01
                  alpha: 0.5
                  use_color: false
                  interlayer_use_source: false
                  interlayer_scale: 0.08
                  interlayer_alpha: 0.4
                  interlayer_use_color: true
                  interlayer_insertion_skip: 0
              4:
                z_offset_scale: 4.2
                visualize: true
                nodes:
                  scale: 0.6
                  color:
                    type: IdColorAdapter
                    colormap: {palette: colorbrewer}
                  alpha: 0.8
                  use_sphere: false
                text: {draw: true, height: 1.25, scale: 1.0}
                edges:
                  scale: 0.1
                  alpha: 0.2
                  use_color: false
                  interlayer_use_source: true
                  interlayer_scale: 0.08
                  interlayer_alpha: 0.4
                  interlayer_use_color: true
                  interlayer_insertion_skip: 0
  sinks:
    - type: TsdfOccupancyPublisher
      min_distance: 0.25
      use_relative_height: true
      slice_height: 0.0
      num_slices: 1
frontend:
  type: GraphBuilder
  enable_mesh_objects: false
  serialize_dsg_mesh: false
  clear_object_meshes: true
  pgmo: {time_horizon: 15.0, d_graph_resolution: 2.5, mesh_resolution: 0.005}
  graph_connector:
    layers:
      - parent_layer: MESH_PLACES
        child_layers:
          - {layer: OBJECTS}
  graph_updater:
    layer_updates:
      OBJECTS:
        prefix: O
        matcher: {type: IoUNodeMatcher, min_same_iou: 0.2, min_cross_iou: 0.5}
  surface_places:
    type: place_2d
    prefix: P
    pure_final_place_size: 3
    enable_place_purity: false
    impure_final_place_size: 1
    cluster_tolerance: .3
    min_cluster_size: 50
    max_cluster_size: 100000
    min_final_place_points: 10
    place_max_neighbor_z_diff: .5
    place_overlap_threshold: 0.0
backend:
  type: BackendModule
  enable_zmq_interface: false
  publish_backend_tf: false
  serialize_dsg_mesh: false
  min_dsg_separation_s: 1
  publish_mesh: true
  min_mesh_separation_s: 10
  add_places_to_deformation_graph: false
  optimize_on_lc: false
  update_functors:
    agents: {type: UpdateAgentsFunctor}
    objects: {type: UpdateObjectsFunctor}
    surface_places: {type: Update2dPlacesFunctor, min_size: 3}
  pgmo:
    run_mode: FULL
    embed_trajectory_delta_t: 5.0
    num_interp_pts: 3
    interp_horizon: 10.0
    add_initial_prior: false
    optimizer:
      type: KimeraRpgoOptimizer
      solver: LM
      gnc: {inlier_probability: 0.9, mu_step: 1.6, max_iterations: 100}
    covariance:
      odom: 1.0e-02
      loop_close: 5.0e-02
      sg_loop_close: 1.0e-01
      prior: 1.0e-02
      mesh_mesh: 1.0e-02
      pose_mesh: 1.0e-02
      place_mesh: 1.0e-02
      place_edge: 10.0
      place_merge: 10.0
      object_merge: 10.0
