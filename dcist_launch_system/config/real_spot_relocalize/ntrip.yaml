/**:
  ros__parameters:
    host: $(env ADT4_NTRIP_HOST)
    port: $(env ADT4_NTRIP_PORT)
    mountpoint: $(env ADT4_NTRIP_MOUNTPOINT)
    authenticate: true
    username: $(env ADT4_NTRIP_USERNAME)
    password: $(env ADT4_NTRIP_PASSWORD)
    ntrip_version: None
    ssl: false
    cert: None
    key: None
    ca_cert: None
    debug: true
    rtcm_message_package: rtcm_msgs
    rtcm_frame_id: odom
    nmea_max_length: 128
    nmea_min_length: 3
    rtcm_message_package: rtcm_msgs
    reconnect_attempt_max: 10
    reconnect_attempt_wait_seconds: 5
    rtcm_timeout_seconds: 4
