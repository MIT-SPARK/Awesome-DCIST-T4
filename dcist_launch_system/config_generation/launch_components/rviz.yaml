---
nodes_to_monitor:
  nlu_rviz_instruction_panel: {}
  nlu_rviz_manipulation_panel: {}
windows:
  - window_name: rviz
    shell_command_before: source ${ADT4_WS}/install/setup.zsh
    layout: tiled
    panes: #optionally pass the rviz_config:=$ADT4_RVIZ_CONFIG launch file arg if the ADT4_RVIZ_CONFIG environment variable is set and not null
      - ros2 launch dcist_launch_system master.launch.yaml conf_name:=$config sim_time:=$sim_time robot_name:=$ADT4_ROBOT_NAME launch_rviz:=true ${ADT4_RVIZ_CONFIG:+rviz_config:=$ADT4_RVIZ_CONFIG}
