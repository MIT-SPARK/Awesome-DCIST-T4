---
windows:
  - window_name: prior_map_visualizer
    shell_command_before: source ${ADT4_WS}/install/setup.zsh
    layout: tiled
    panes: 
      - ros2 launch dcist_launch_system master.launch.yaml conf_name:=$config sim_time:=$sim_time robot_name:=$ADT4_ROBOT_NAME launch_scene_graph_publisher:=true backend_dsg_topic:=hydra/backend/prior_dsg
      - ros2 launch dcist_launch_system master.launch.yaml conf_name:=$config sim_time:=$sim_time robot_name:=$ADT4_ROBOT_NAME launch_hydra_visualizer:=true backend_dsg_topic:=hydra/backend/prior_dsg