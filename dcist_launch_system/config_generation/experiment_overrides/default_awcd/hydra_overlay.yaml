active_window:  
  sinks:
    - type: TsdfGradientOccupancyPublisher
      gradient_threshold: 0.5
      min_weight: 1.0e-6
      min_confidence: 0.5
      smoothing: true
      probabilistic: false
      use_relative_height: true
      slice_height: -1.5
      num_slices: 25
      filter_disjoint: true
frontend:
  clear_object_meshes: false
  traversability_places:
    estimator: !reset
      type: GradientTraversabilityEstimator
      gradient_threshold: 0.5
      height_above: 0.3
      height_below: 1.0
      min_confidence: 0.5
      min_traversability: 0.1 # gradient below 0.45 is traversable
      pessimistic: true
      smoothing: true
        